name: sawitify
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  dio: ^5.9.2
  retrofit: ^4.9.2
  json_annotation: ^4.11.0
  package_info_plus: ^10.1.0
  sqflite: ^2.4.3
  path: ^1.9.1
  uuid: ^4.5.3
  flutter_riverpod: ^2.6.1
  quickalert: ^1.1.0
  tutorial_coach_mark: ^1.2.11
  easy_stepper: ^1.1.0
  mobile_scanner: ^7.2.0
  carousel_slider: ^5.1.2
  dartz: ^0.10.1
  intl: ^0.20.2
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0
  widgetbook: ^3.23.0
  widgetbook_annotation: ^3.11.0
  flutter_dotenv: ^5.2.1
  marquee: ^2.3.0
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  cached_network_image: ^3.4.1
  flutter_volume_controller: ^2.0.1
  shimmer: ^3.0.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  build_runner: ^2.15.0
  retrofit_generator: ^10.2.5
  widgetbook_generator: ^3.23.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo/ic_app.png
    - assets/logo/ic_logo_vertical.png
    - assets/logo/ic_logo_horizontal.png
    - assets/logo/ic_sawitify.png
    - assets/logo/ic_sawitify_long.png
    - assets/logo/ic_sawitify_text.png
    - assets/image/ic_google.png
    - assets/image/ic_apple.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/ic_app.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  image: assets/logo/ic_logo_horizontal.png

  android_12:
    color: "#000000"
    image: assets/logo/ic_logo_horizontal.png

  ios: true
  android: true
